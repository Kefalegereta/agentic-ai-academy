<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Data Quality Checker · dataroots{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="wrap">
    <div class="topbar">
      <a href="/" class="brand"><img class="logo" src="/static/dataroots-logo.png" alt="dataroots"></a>
      {% block topright %}{% endblock %}
    </div>
    {% block content %}{% endblock %}
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
